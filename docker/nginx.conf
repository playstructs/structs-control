server {
    listen 80;
    server_name _;
    root /app/dist;
    index index.html;

    # Runtime config — editable per deploy without rebuild.
    location = /config.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Hashed bundles — long cache ($ must be in single quotes; nginx treats $ as variables).
    location ~* '^/(js|css)/.+\.[a-f0-9]{8}\.(js|css)$' {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
